    <path d="M38 52 C 28 62, 20 78, 23 95 C 25 105, 28 112, 30 116 C 29 106, 28 96, 29 85 C 30 72, 33 60, 38 52 Z" fill="url(#goldLight)" />
    <path d="M40 60 C 34 68, 29 80, 31 93 C 32 100, 34 105, 34 108 C 34 100, 34 92, 36 82 C 37 74, 38 66, 40 60 Z" fill="#fff" fill-opacity="0.3" />
  </g>

